<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Sage green circle background -->
  <circle cx="200" cy="200" r="200" fill="#7d8a6e"/>
  
  <!-- "drip" wordmark - thin, modern, rounded lowercase letterforms matching the actual logo -->
  <!-- The letters use uniform thin strokes with round caps, creating an elegant modern feel -->
  <!-- Based on the 2400x2400 reference: letters are tall, thin, evenly spaced -->
  <g fill="none" stroke="#ffffff" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- d: round bowl on left + tall vertical stem on right -->
    <!-- Bowl is a full circle-ish shape, stem extends up above the bowl -->
    <path d="M110,192 C110,176 120,164 134,164 C148,164 158,176 158,192 C158,208 148,220 134,220 C120,220 110,208 110,192 Z"/>
    <line x1="158" y1="142" x2="158" y2="220"/>
    
    <!-- r: vertical stem + small shoulder curve at top right -->
    <line x1="176" y1="164" x2="176" y2="220"/>
    <path d="M176,182 C176,170 185,164 194,164"/>
    
    <!-- i: just the vertical stem (dot replaced by teardrop) -->
    <line x1="210" y1="164" x2="210" y2="220"/>
    
    <!-- p: round bowl on right + vertical stem with descender on left -->
    <path d="M228,192 C228,176 238,164 252,164 C266,164 276,176 276,192 C276,208 266,220 252,220 C238,220 228,208 228,192 Z"/>
    <line x1="228" y1="164" x2="228" y2="248"/>
  </g>
  
  <!-- Teardrop water drop replacing the i dot -->
  <!-- Small, elegant drop shape pointing downward -->
  <path d="M210,141 C210,141 203.5,150.5 203.5,154.5 C203.5,158.1 206.4,161 210,161 C213.6,161 216.5,158.1 216.5,154.5 C216.5,150.5 210,141 210,141 Z" fill="#ffffff"/>
  
  <!-- "COFFEE" in small spaced caps -->
  <text x="196" y="252" text-anchor="middle" fill="#ffffff" font-family="'Questrial', 'Work Sans', sans-serif" font-size="14.5" font-weight="400" letter-spacing="4.5">COFFEE</text>
  
  <!-- "& BAKED GOODS" slightly smaller, also spaced caps -->
  <text x="196" y="270" text-anchor="middle" fill="#ffffff" font-family="'Questrial', 'Work Sans', sans-serif" font-size="14.5" font-weight="400" letter-spacing="3">&#38; BAKED GOODS</text>
</svg>
